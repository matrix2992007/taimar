<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youssef Elite 3D | Pro System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div id="onboarding" class="modal-overlay">
        <div class="modal-content glass-effect">
            <div id="step1" class="step active">
                <div class="neon-icon-circle"><i class="fas fa-robot"></i></div>
                <h2>أهلاً يا يوسف!</h2>
                <p>سجل بياناتك لتفعيل مدربك الذكي</p>
                <input type="text" id="userNameInput" placeholder="اكتب اسمك هنا...">
                <button class="btn-main" onclick="goToStep(2)">استمرار <i class="fas fa-arrow-left"></i></button>
            </div>
            <div id="step2" class="step">
                <h2>القياسات الحيوية</h2>
                <div class="input-group">
                    <input type="number" id="userWeightInput" placeholder="الوزن (كجم)">
                    <input type="number" id="userHeightInput" placeholder="الطول (سم)">
                </div>
                <button class="btn-main" onclick="finishOnboarding()">دخول النظام <i class="fas fa-bolt"></i></button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="app-container app-hidden">
        
        <header class="main-header glass-effect">
            <div class="user-meta">
                <h2 id="displayUserName">يوسف</h2>
                <div id="rankBadge" class="badge-rank">رتبة: مستجد</div>
            </div>
            <div class="goal-indicator" id="goalTag">تحليل الهدف...</div>
        </header>

        <main class="content-scroll">
            
            <section id="workoutTab" class="tab-content">
                <div class="card body-card">
                    <h3>خريطة العضلات التفاعلية</h3>
                    <div class="svg-container">
                        <svg viewBox="0 0 200 450" class="human-body-svg">
                            <circle cx="100" cy="40" r="22" class="muscle-static" />
                            <path id="chest" d="M70,80 Q100,70 130,80 L135,130 Q100,140 65,130 Z" class="muscle-part" onclick="loadMuscleLibrary('chest', 'الصدر')"/>
                            <path id="abs" d="M75,145 H125 L120,200 H80 Z" class="muscle-part" onclick="loadMuscleLibrary('abs', 'البطن')"/>
                            <path id="arms" d="M45,85 L65,130 L40,220 M155,85 L135,130 L160,220" class="muscle-part-line" onclick="loadMuscleLibrary('arms', 'الذراعين')"/>
                            <path id="legs" d="M75,210 L95,215 L90,380 H65 Z M125,210 L105,215 L110,380 H135 Z" class="muscle-part" onclick="loadMuscleLibrary('legs', 'الأرجل')"/>
                        </svg>
                    </div>
                </div>

                <div id="exerciseListContainer" class="card list-card app-hidden">
                    <h3 id="muscleTitle">تمارين العضلة</h3>
                    <div id="exerciseItemsGrid" class="exercise-grid"></div>
                </div>

                <div id="timerCard" class="card timer-card app-hidden">
                    <h4 id="currentExerciseName">اسم التمرين</h4>
                    <div class="timer-circle">
                        <span id="timerDisplay">00:00</span>
                    </div>
                    <div class="timer-controls">
                        <button id="startBtn" class="btn-start" onclick="startWorkoutSession()">ابدأ <i class="fas fa-play"></i></button>
                        <button id="stopBtn" class="btn-stop app-hidden" onclick="stopWorkoutSession()">إنهاء <i class="fas fa-stop"></i></button>
                    </div>
                </div>
            </section>

            <section id="analysisTab" class="tab-content app-hidden">
                <div class="card analysis-card">
                    <h3>تحليل القوة العضلية</h3>
                    <div id="analysisBodyView" class="mini-map"></div>
                    <div id="statsDetail" class="stats-list"></div>
                </div>
                <div class="card achievements-card">
                    <h3>الأوسمة المحققة</h3>
                    <div id="achievementsGrid" class="achievements-grid">
                        </div>
                </div>
            </section>

            <section id="nutritionTab" class="tab-content app-hidden">
                <div class="card nutrition-card">
                    <h3>برنامجك الغذائي الذكي</h3>
                    <div id="nutritionContent" class="nutrition-box"></div>
                </div>
            </section>
        </main>

        <nav class="bottom-nav glass-effect">
            <div class="nav-item active" onclick="switchTab('workout')">
                <i class="fas fa-dumbbell"></i><p>تمرين</p>
            </div>
            <div class="nav-item" onclick="switchTab('analysis')">
                <i class="fas fa-chart-pie"></i><p>تحليل</p>
            </div>
            <div class="nav-item" onclick="switchTab('nutrition')">
                <i class="fas fa-utensils"></i><p>تغذية</p>
            </div>
            <div class="nav-item" onclick="reOpenSettings()">
                <i class="fas fa-user-gear"></i><p>إعدادات</p>
            </div>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>

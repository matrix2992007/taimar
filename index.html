<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plank Master | تايمر التحدي</title>
    <style>
        :root {
            --primary: #6366f1;
            --accent: #a855f7;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 { font-weight: 300; margin-bottom: 30px; letter-spacing: 1px; }

        .timer-display {
            font-size: 5rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            margin: 20px 0;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .status-label {
            font-size: 1.2rem;
            color: #94a3b8;
            height: 1.5rem;
            margin-bottom: 10px;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        button {
            padding: 12px 28px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-start { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); }
        .btn-start:hover { transform: translateY(-2px); filter: brightness(1.1); }
        
        .btn-stop { background: #ef4444; color: white; display: none; }
        
        .history-section {
            width: 100%;
            max-width: 500px;
            margin-top: 30px;
            background: var(--glass);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--glass-border);
        }

        .history-list {
            list-style: none;
            padding: 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid var(--glass-border);
            font-size: 0.9rem;
            color: #cbd5e1;
        }

        /* Preparation Pulse Effect */
        .preparing {
            animation: pulse 1s infinite;
            color: #fbbf24 !important;
            -webkit-text-fill-color: #fbbf24 !important;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Plank Timer</h1>
        <div id="status" class="status-label">جاهز للتحدي؟</div>
        <div id="display" class="timer-display">00:00</div>
        
        <div class="controls">
            <button id="startBtn" class="btn-start" onclick="startChallenge()">ابدأ (5 ثواني تحضير)</button>
            <button id="stopBtn" class="btn-stop" onclick="stopChallenge()">خلاص مش قادر!</button>
        </div>
    </div>

    <div class="history-section">
        <h3>سجل الأرقام القياسية</h3>
        <div id="historyList" class="history-list">
            </div>
    </div>

    <script>
        let timer;
        let seconds = 0;
        let isPreparing = false;
        const display = document.getElementById('display');
        const status = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const historyList = document.getElementById('historyList');

        // تحميل السجل من LocalStorage
        let history = JSON.parse(localStorage.getItem('plankHistory')) || [];
        updateHistoryDisplay();

        function startChallenge() {
            startBtn.style.display = 'none';
            stopBtn.style.display = 'block';
            seconds = 0;
            display.innerText = "05";
            status.innerText = "استعد.. خذ وضعيتك!";
            display.classList.add('preparing');
            
            let prepSeconds = 5;
            isPreparing = true;

            const prepInterval = setInterval(() => {
                prepSeconds--;
                display.innerText = prepSeconds < 10 ? "0" + prepSeconds : prepSeconds;

                if (prepSeconds <= 0) {
                    clearInterval(prepInterval);
                    startActualTimer();
                }
            }, 1000);
        }

        function startActualTimer() {
            isPreparing = false;
            display.classList.remove('preparing');
            status.innerText = "عاش! استمر..";
            
            timer = setInterval(() => {
                seconds++;
                let mins = Math.floor(seconds / 60);
                let secs = seconds % 60;
                display.innerText = 
                    (mins < 10 ? "0" + mins : mins) + ":" + 
                    (secs < 10 ? "0" + secs : secs);
            }, 1000);
        }

        function stopChallenge() {
            clearInterval(timer);
            if (!isPreparing && seconds > 0) {
                saveToHistory(display.innerText);
            }
            
            // إعادة ضبط الواجهة
            status.innerText = "انتهى التحدي! بطل";
            startBtn.style.display = 'block';
            stopBtn.style.display = 'none';
            display.classList.remove('preparing');
        }

        function saveToHistory(time) {
            const now = new Date();
            const dateStr = now.toLocaleDateString('ar-EG') + " " + now.toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'});
            history.unshift({ time, date: dateStr });
            if (history.length > 10) history.pop(); // حفظ آخر 10 مرات فقط
            localStorage.setItem('plankHistory', JSON.stringify(history));
            updateHistoryDisplay();
        }

        function updateHistoryDisplay() {
            historyList.innerHTML = history.map(item => `
                <div class="history-item">
                    <span>⏱️ ${item.time}</span>
                    <span>📅 ${item.date}</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
